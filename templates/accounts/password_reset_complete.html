{% extends 'base.html' %}

{% block title %}Password Reset Complete - Support Ticket System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header bg-success text-white text-center py-4">
                    <h3 class="mb-0">Password Reset Complete</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                    <h5 class="mb-3">Your password has been set successfully!</h5>
                    <p class="text-muted mb-4">You may now log in with your new password.</p>
                    
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Login Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
