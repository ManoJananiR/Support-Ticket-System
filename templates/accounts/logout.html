{% extends 'base.html' %}

{% block title %}Logged Out - Support Ticket System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header bg-success text-white text-center py-4">
                    <h3 class="mb-0">Logged Out Successfully</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                    <h5 class="mb-3">You have been logged out.</h5>
                    <p class="text-muted mb-4">Thank you for using our support ticket system.</p>
                    
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt me-2"></i>Login Again
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
